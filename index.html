<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="paint-roller-solid-full.svg" type="image/svg+xml">
    <title>ColorForge - Professional Color Codes</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

    <div class="bg-animation"></div>

    <!-- HEADER -->

<header class="header">

    <div class="logo">
        <i class="fas fa-palette"></i>
        <span>ColorForge</span>
    </div>

    <nav class="nav-links">

        <a href="#">Home</a>

        <a href="#">HEX</a>

        <a href="#">RGB</a>

        <a href="#">HSL</a>

        <a href="#">CMYK</a>

    </nav>

</header>

    <!-- HERO -->

    <section class="hero">

        <h1>Create Perfect Colors</h1>

        <p>
            Pick stunning colors and instantly get HEX,
            RGB, HSL and CMYK values for your design projects.
        </p>

    </section>

    <!-- MAIN SECTION -->

    <section class="main-container">

        <!-- LEFT SIDE -->

        <div class="picker-panel">

            <h2>Choose Your Color</h2>

            <div id="pickerContainer">

                <!-- Color Picker Goes Here -->

                <input
                    type="color"
                    id="colorPicker"
                    value="#7c3aed"
                    class="big-picker"
                >

            </div>

            <div id="colorPreview"></div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="codes-panel">

            <div class="code-box">
                <span>HEX CODE</span>
                <input type="text" id="hexValue" readonly>
            </div>

            <div class="code-box">
                <span>RGB</span>
                <input type="text" id="rgbValue" readonly>
            </div>

            <div class="code-box">
                <span>HSL</span>
                <input type="text" id="hslValue" readonly>
            </div>

            <div class="code-box">
                <span>CMYK</span>
                <input type="text" id="cmykValue" readonly>
            </div>

            <div class="code-box">
                <span>HTML COLOR</span>
                <input type="text" id="htmlValue" readonly>
            </div>

            <div class="code-box">
                <span>HSLA</span>
                <input type="text" id="hslaValue" readonly>
            </div>

        </div>

    </section>

    <!-- FOOTER -->

    <footer>

        <h2>Satyoki Datta</h2>

        <p>Professional Developer</p>

        <div class="socials">

            <a href="https://discord.gg/GFD2rZC2">
                <i class="fab fa-discord"></i>
            </a>

            <a href="#">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="#">
                <i class="fab fa-youtube"></i>
            </a>

            <a href="#">
                <i class="fab fa-x-twitter"></i>
            </a>

        </div>

    </footer>

    <script src="script.js"></script>

</body>
</html>
